name: Mundial 2026 — Contenido diario automático

on:
  schedule:
    - cron: '0 7 * * *'  # 08:00 hora España (UTC+1) = 07:00 UTC
  workflow_dispatch:       # También permite ejecutarlo manualmente desde GitHub

jobs:
  generar-contenido:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch

      - name: Generar contenido del Mundial
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: node $GITHUB_WORKSPACE/scripts/generar-mundial.js

      - name: Publicar cambios en GitHub
        run: |
          git config user.name "TopViral Bot"
          git config user.email "bot@topviral.com"
          git add .
          git diff --staged --quiet || git commit -m "Mundial 2026: contenido automático $(date +'%d/%m/%Y')"
          git push
